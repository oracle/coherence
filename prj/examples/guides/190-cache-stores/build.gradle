import groovy.xml.XmlSlurper

plugins {
  id 'java'
}

group = 'com.oracle.coherence.guides'
version = '${coherenceVersion}'
sourceCompatibility = '17'

// read shared dependency versions from pom.xml so the Maven and Gradle example builds stay aligned
def pomProperty = { String name ->
    File directory = projectDir
    while (directory != null) {
        File pomFile = new File(directory, 'pom.xml')
        if (pomFile.exists()) {
            def value = new XmlSlurper().parse(pomFile).properties.children().find { it.name() == name }?.text()
            if (value) {
                return value
            }
        }
        directory = directory.parentFile
    }
    throw new GradleException("Missing '${name}' property in pom.xml hierarchy for ${projectDir}")
}
def hamcrestVersion = pomProperty('hamcrest.version')
def junitVersion = pomProperty('junit.jupiter.version')
def junitPlatformVersion = junitVersion.replaceFirst(/^5\./, '1.')

repositories {
  mavenLocal()
  mavenCentral()
}

configurations {
  mockitoAgent
}

dependencies {
  implementation platform(
          "${coherenceGroupId}:coherence-bom:${coherenceVersion}")
  testImplementation "org.junit.jupiter:junit-jupiter-api:${junitVersion}"
  testImplementation "org.junit.jupiter:junit-jupiter-params:${junitVersion}"
  testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"
  testRuntimeOnly "org.junit.platform:junit-platform-launcher:${junitPlatformVersion}"

  implementation "${coherenceGroupId}:coherence"

  testImplementation "com.oracle.coherence.hibernate:coherence-hibernate-cache-store:${hibernateCacheStoreVersion}"
  testImplementation "org.hibernate:hibernate-core:${hibernateVersion}"
  testImplementation "org.mockito:mockito-core:${mockitoVersion}"
  testImplementation "${coherenceGroupId}:coherence-bedrock-testing-support"
  testImplementation "org.hamcrest:hamcrest:${hamcrestVersion}"

  implementation "com.h2database:h2:${h2Version}"
  implementation "io.r2dbc:r2dbc-h2:${r2dbch2Version}"
  testImplementation "org.hsqldb:hsqldb:${hsqldbVersion}"
  mockitoAgent("org.mockito:mockito-core:${mockitoVersion}") {
    transitive = false
  }
}

test {
  jvmArgs "-javaagent:${configurations.mockitoAgent.asPath}"
  testLogging {
    events "PASSED", "SKIPPED", "FAILED", "STANDARD_OUT", "STANDARD_ERROR"
  }
  useJUnitPlatform()
}
